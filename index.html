<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <!-- 添加 CSP 增强安全性 -->
        <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline'; connect-src 'self' https://api.siliconflow.cn; img-src 'self' https://avatars.githubusercontent.com;">
        <title>𝘥𝘰𝘱𝘢</title>
        <link rel="stylesheet" href="./css/reset.css" />
        <link rel="stylesheet" href="./css/style.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
            integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <style>
            .search-box input::placeholder {
                color: #000000;
            }
            /* 添加聊天框样式 */
            .chat-container {
                padding: 20px;
                max-width: 600px;
                margin: 20px auto;
            }
            .chat-input {
                width: 70%;
                padding: 10px;
                border: 1px solid #ccc;
                border-radius: 5px;
                background-color: #333333;
                color: #ffffff;
            }
            .chat-button {
                padding: 10px 20px;
                background: #4285f4;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                margin-left: 10px;
            }
            .chat-response {
                margin-top: 15px;
                padding: 10px;
                background: #f5f5f5;
                border-radius: 5px;
                color: #333;
            }
            /* 添加加载动画 */
            .chat-response.loading::before {
                content: '正在加载...';
                display: inline-block;
                animation: pulse 1.5s infinite;
            }
            @keyframes pulse {
                0% { opacity: 1; }
                50% { opacity: 0.5; }
                100% { opacity: 1; }
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="user">
                <div class="img-box">
                    <img src="https://avatars.githubusercontent.com/u/50571734?s=100&u=82d49ceecfc580df6eb42a17ce8dc6fd4a01b356&v=4" />
                </div>
                <div class="content">
                    <h2>永远保持一颗学习的心</h2>
                    <h1>Always keep a heart of learning</h1>
                </div>
                <div class="toggle"></div>
            </div>
            <!-- Google 搜索框 -->
            <div class="search-box" style="padding: 20px; text-align: center;">
                <form action="https://www.google.com/search" method="get" target="_blank">
                    <input 
                        type="text" 
                        name="q" 
                        placeholder="搜索网络..." 
                        style="padding: 10px; width: 250px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; color: #ffffff; background-color: #333333;"
                    >
                    <button 
                        type="submit" 
                        style="padding: 10px; background: #4285f4; color: white; border: none; border-radius: 5px; cursor: pointer; margin-left: 10px; width: 40px;"
                    >
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>
            </div>
            <!-- 添加 DeepSeek-V3 聊天区域 -->
            <div class="chat-container">
                <input 
                    type="text" 
                    id="chatInput" 
                    class="chat-input" 
                    placeholder="问我任何问题..."
                >
                <button onclick="sendMessage()" class="chat-button">发送</button>
                <div id="chatResponse" class="chat-response"></div>
            </div>
            <ul class="contact">
                <li style="--cir: #c71610; --i: 0">
                    <a href="https://github.com" target="_blank">
                        <div class="icon-box"><i class="fa-brands fa-github"></i></div>
                        <p>GitHub仓库地址</p>
                    </a>
                </li>
                <li style="--cir: #171515; --i: 1">
                    <a href="https://t.me/dopasel" target="_blank">
                        <div class="icon-box"><i class="fa-brands fa-telegram"></i></div>
                        <p>私人Telegram</p>
                    </a>
                </li>
                <li style="--cir: #0a66c2; --i: 2">
                    <a href="https://t.me/" target="_blank">
                        <div class="icon-box"><i class="fa-solid fa-user"></i></div>
                        <p>交流群组</p>
                    </a>
                </li>
            </ul>
        </div>

        <script>
            // 卡片切换功能
            let toggle = document.querySelector('.toggle');
            let card = document.querySelector('.card');
            toggle.onclick = () => {
                card.classList.toggle('active');
            };

            // DeepSeek-V3 API 调用函数（优化版）
            async function sendMessage() {
                const input = document.getElementById('chatInput');
                const responseDiv = document.getElementById('chatResponse');
                const message = input.value.trim();

                if (!message) {
                    responseDiv.innerHTML = '请输入问题！';
                    return;
                }

                responseDiv.classList.add('loading'); // 添加加载动画

                try {
                    const response = await fetch('https://api.siliconflow.cn/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer sk-qmosrnrfjgdrwlzzjpoulwieyxqrpjmibtwuuafmkwwpfsvb',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'deepseek-ai/DeepSeek-V3',
                            messages: [
                                { role: 'user', content: message }
                            ],
                            max_tokens: 200, // 减少回答长度，让响应更快
                            temperature: 0.7
                        })
                    });

                    if (!response.ok) {
                        throw new Error('API 请求失败');
                    }

                    const data = await response.json();
                    const reply = data.choices[0].message.content.replace(/\n/g, '<br>');
                    responseDiv.innerHTML = reply;
                } catch (error) {
                    responseDiv.innerHTML = `错误: ${error.message}`;
                }

                responseDiv.classList.remove('loading'); // 移除加载动画
                input.value = ''; // 清空输入框
            }

            // 防止 XSS，清理输入
            function sanitizeInput(input) {
                const div = document.createElement('div');
                div.textContent = input;
                return div.innerHTML;
            }

            // 监听 Enter 键发送消息
            document.getElementById('chatInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
        </script>
    </body>
</html>
