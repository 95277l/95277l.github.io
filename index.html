<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <!-- 添加 CSP 增强安全性 -->
        <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline'; connect-src 'self' https://api.siliconflow.cn; img-src 'self' https://avatars.githubusercontent.com;">
        <title>𝘥𝘰𝘱𝘢</title>
        <link rel="stylesheet" href="./css/reset.css" />
        <link rel="stylesheet" href="./css/style.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
            integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <style>
            /* 背景图片（与学习相关，浅色透明） */
            body {
                background-image: url('https://images.unsplash.com/photo-1515378791036-0648a3ef77b2?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1470&q=80');
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                margin: 0;
                font-family: Arial, sans-serif;
            }

            /* 卡片样式 */
            .card {
                background: #ffffff; /* 白色背景 */
                border-radius: 10px;
                padding: 20px;
                margin: 20px auto;
                max-width: 800px;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* 添加阴影 */
                border: 1px solid #e0e0e0; /* 添加细线 */
            }

            .user {
                display: flex;
                align-items: center;
                margin-bottom: 30px; /* 增加间距 */
            }
            .img-box img {
                border-radius: 50%;
                width: 100px;
                height: 100px;
            }
            .content h2, .content h1 {
                margin: 0;
                font-weight: bold;
            }
            .content h2 {
                font-size: 18px;
                color: #666;
            }
            .content h1 {
                font-size: 24px;
                color: #333;
            }
            .toggle {
                width: 30px;
                height: 30px;
                background: #4285f4;
                border-radius: 50%;
                cursor: pointer;
                margin-left: 20px;
            }

            .search-box input::placeholder {
                color: #000000;
            }
            .search-box {
                padding: 20px;
                text-align: center;
            }
            .search-box input {
                padding: 10px;
                width: 250px;
                border: 1px solid #ccc;
                border-radius: 5px;
                font-size: 16px;
                color: #ffffff;
                background-color: #333333;
            }
            .search-box button {
                padding: 10px;
                background: #4285f4;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                margin-left: 10px;
                width: 40px;
            }

            /* 聊天框样式 */
            .chat-container {
                padding: 30px; /* 增加外边距 */
                max-width: 600px;
                margin: 30px auto; /* 增加上下间距 */
            }
            .chat-input {
                width: 70%;
                padding: 10px;
                border: 1px solid #ccc;
                border-radius: 5px;
                background-color: #333333;
                color: #ffffff;
            }
            .chat-button, .bye-button {
                padding: 12px 25px; /* 增大按钮大小 */
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                margin-left: 10px;
            }
            .chat-button {
                background: #4169E1; /* 更亮的蓝色 */
            }
            .bye-button {
                background: #FF4040; /* 更深的红色 */
            }
            .chat-input, .chat-button, .bye-button {
                display: inline-block; /* 让按钮和输入框并排 */
                vertical-align: middle; /* 垂直居中 */
            }
            .chat-response {
                margin-top: 20px; /* 增大间距 */
                padding: 15px; /* 增加内边距 */
                background: #f5f5f5;
                border-radius: 5px;
                color: #333;
            }
            /* 添加加载动画 */
            .chat-response.loading::before {
                content: '正在加载...';
                display: inline-block;
                animation: pulse 1.5s infinite;
            }
            @keyframes pulse {
                0% { opacity: 1; }
                50% { opacity: 0.5; }
                100% { opacity: 1; }
            }

            /* 响应式设计 */
            @media (max-width: 600px) {
                .card {
                    max-width: 90%; /* 小屏幕时卡片更窄 */
                    margin: 10px auto;
                }
                .chat-input {
                    width: 60%; /* 缩小输入框宽度 */
                }
                .chat-button, .bye-button {
                    padding: 10px 20px; /* 缩小按钮大小 */
                }
                .content h1 {
                    font-size: 20px; /* 减小标题大小 */
                }
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="user">
                <div class="img-box">
                    <img src="https://avatars.githubusercontent.com/u/50571734?s=100&u=82d49ceecfc580df6eb42a17ce8dc6fd4a01b356&v=4" />
                </div>
                <div class="content">
                    <h2>永远保持一颗学习的心</h2>
                    <h1>Always keep a heart of learning</h1>
                </div>
                <div class="toggle"></div>
            </div>
            <!-- Google 搜索框 -->
            <div class="search-box">
                <form action="https://www.google.com/search" method="get" target="_blank">
                    <input 
                        type="text" 
                        name="q" 
                        placeholder="搜索网络..." 
                    >
                    <button 
                        type="submit" 
                    >
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>
            </div>
            <!-- 添加 DeepSeek-V3 聊天区域 -->
            <div class="chat-container">
                <input 
                    type="text" 
                    id="chatInput" 
                    class="chat-input" 
                    placeholder="问我任何问题..."
                >
                <button onclick="sendMessage()" class="chat-button">发送</button>
                <button class="bye-button">Bye bye!</button> <!-- 并排放在发送按钮旁边 -->
                <div id="chatResponse" class="chat-response"></div>
            </div>
        </div>

        <script>
            // 卡片切换功能
            let toggle = document.querySelector('.toggle');
            let card = document.querySelector('.card');
            toggle.onclick = () => {
                card.classList.toggle('active');
            };

            // DeepSeek-V3 API 调用函数（优化版）
            async function sendMessage() {
                const input = document.getElementById('chatInput');
                const responseDiv = document.getElementById('chatResponse');
                const message = input.value.trim();

                if (!message) {
                    responseDiv.innerHTML = '请输入问题！';
                    return;
                }

                responseDiv.classList.add('loading'); // 添加加载动画

                try {
                    const response = await fetch('https://api.siliconflow.cn/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer sk-qmosrnrfjgdrwlzzjpoulwieyxqrpjmibtwuuafmkwwpfsvb',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'deepseek-ai/DeepSeek-V3',
                            messages: [
                                { role: 'user', content: message }
                            ],
                            max_tokens: 200, // 减少回答长度，让响应更快
                            temperature: 0.7
                        })
                    });

                    if (!response.ok) {
                        throw new Error('API 请求失败');
                    }

                    const data = await response.json();
                    const reply = data.choices[0].message.content.replace(/\n/g, '<br>');
                    responseDiv.innerHTML = reply;
                } catch (error) {
                    responseDiv.innerHTML = `错误: ${error.message}`;
                }

                responseDiv.classList.remove('loading'); // 移除加载动画
                input.value = ''; // 清空输入框
            }

            // 防止 XSS，清理输入
            function sanitizeInput(input) {
                const div = document.createElement('div');
                div.textContent = input;
                return div.innerHTML;
            }

            // 监听 Enter 键发送消息
            document.getElementById('chatInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
        </script>
    </body>
</html>
