<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>𝘥𝘰𝘱𝘢</title>
        <link rel="stylesheet" href="./css/reset.css" />
        <link rel="stylesheet" href="./css/style.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
            integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <style>
            /* 自定义占位符文字颜色为黑色 */
            .search-box input::placeholder {
                color: #000000; /* 黑色 */
            }
            /* 调整搜索框位置 */
            .search-box {
                padding: 20px;
                text-align: center;
                margin-top: 10px; /* 向下移动 10 像素 */
            }
            /* 添加聊天框样式 */
            .chat-container {
                padding: 20px;
                max-width: 600px;
                margin: 20px auto;
            }
            .chat-input {
                width: 70%;
                padding: 10px;
                border: 1px solid #ccc;
                border-radius: 5px;
                background-color: #333333;
                color: #ffffff;
            }
            .chat-button, .bye-button {
                padding: 12px 25px; /* 增大按钮大小 */
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                margin-left: 10px;
            }
            .chat-button {
                background: #4169E1; /* 更亮的蓝色 */
            }
            .bye-button {
                background: #FF4040; /* 更深的红色 */
            }
            .chat-response {
                margin-top: 20px; /* 增大间距 */
                padding: 15px; /* 增加内边距 */
                background: #f5f5f5;
                border-radius: 5px;
                color: #333;
            }
            /* 添加加载动画 */
            .chat-response.loading::before {
                content: '正在加载...';
                display: inline-block;
                animation: pulse 1.5s infinite;
            }
            @keyframes pulse {
                0% { opacity: 1; }
                50% { opacity: 0.5; }
                100% { opacity: 1; }
            }
            /* 卡片样式 */
            .card {
                background: rgba(255, 255, 255, 0.9); /* 半透明白色卡片 */
                border-radius: 10px;
                padding: 20px;
                margin: 20px auto;
                max-width: 800px;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            }
            .user {
                display: flex;
                align-items: center;
                margin-bottom: 20px;
            }
            .img-box img {
                border-radius: 50%;
                width: 100px;
                height: 100px;
            }
            .content h2, .content h1 {
                margin: 0;
                font-weight: bold;
            }
            .content h2 {
                font-size: 18px;
                color: #666;
            }
            .content h1 {
                font-size: 24px;
                color: #333;
            }
            .toggle {
                width: 30px;
                height: 30px;
                background: #4285f4;
                border-radius: 50%;
                cursor: pointer;
                margin-left: 20px;
            }
            .contact {
                list-style: none;
                padding: 0;
                display: flex;
                justify-content: space-around;
                margin-top: 20px;
            }
            .contact li {
                flex: 1;
                text-align: center;
            }
            .contact li a {
                color: #4169E1; /* 统一用蓝色 */
                text-decoration: none;
            }
            .contact .icon-box {
                font-size: 20px; /* 增大图标 */
                margin-bottom: 10px;
            }
            .contact p {
                margin: 0;
                font-size: 14px;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="user">
                <div class="img-box">
                    <img src="https://avatars.githubusercontent.com/u/50571734?s=100&u=82d49ceecfc580df6eb42a17ce8dc6fd4a01b356&v=4" />
                </div>
                <div class="content">
                    <h2>永远保持一颗学习的心</h2>
                    <h1>Always keep a heart of learning</h1>
                </div>
                <div class="toggle"></div>
            </div>
            <!-- 添加的谷歌搜索框 -->
            <div class="search-box">
                <form action="https://www.google.com/search" method="get" target="_blank">
                    <input 
                        type="text" 
                        name="q" 
                        placeholder="搜索网络..." 
                        style="padding: 10px; width: 250px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; color: #ffffff; background-color: #333333;"
                    >
                    <button 
                        type="submit" 
                        style="padding: 10px; background: #4285f4; color: white; border: none; border-radius: 5px; cursor: pointer; margin-left: 10px; width: 40px;"
                    >
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>
            </div>
            <!-- 聊天区域（使用 OpenAI） -->
            <div class="chat-container">
                <input 
                    type="text" 
                    id="chatInput" 
                    class="chat-input" 
                    placeholder="问我任何问题..."
                >
                <button onclick="sendMessage()" class="chat-button">发送</button>
                <div id="chatResponse" class="chat-response"></div>
                <button class="bye-button">Bye bye!</button> <!-- 添加 Bye bye! 按钮 -->
            </div>
            <!-- 联系方式 -->
            <ul class="contact">
                <li style="--cir: #c71610; --i: 0">
                    <a href="https://github.com" target="_blank">
                        <div class="icon-box"><i class="fa-brands fa-github"></i></div>
                        <p>GitHub仓库地址</p>
                    </a>
                </li>
                <li style="--cir: #171515; --i: 1">
                    <a href="https://t.me/dopasel" target="_blank">
                        <div class="icon-box"><i class="fa-brands fa-telegram"></i></div>
                        <p>私人Telegram</p>
                    </a>
                </li>
                <li style="--cir: #0a66c2; --i: 2">
                    <a href="https://t.me/" target="_blank">
                        <div class="icon-box"><i class="fa-solid fa-user"></i></div>
                        <p>交流群组</p>
                    </a>
                </li>
            </ul>
        </div>
        <script>
            // 卡片切换功能
            let toggle = document.querySelector('.toggle')
            let card = document.querySelector('.card')
            toggle.onclick = () => {
                card.classList.toggle('active')
            }

            // OpenAI API 调用函数（优化版）
            async function sendMessage() {
                const input = document.getElementById('chatInput');
                const responseDiv = document.getElementById('chatResponse');
                const message = input.value.trim();

                if (!message) {
                    responseDiv.innerHTML = '请输入问题！';
                    return;
                }

                responseDiv.classList.add('loading'); // 添加加载动画

                try {
                    const response = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer YOUR_OPENAI_API_KEY', // 替换为你的 OpenAI API 密钥
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'gpt-3.5-turbo', // 使用较快的模型
                            messages: [{ role: 'user', content: message }],
                            max_tokens: 150, // 减少返回的 token 数量，加快响应
                            temperature: 0.7
                        })
                    });

                    if (!response.ok) {
                        throw new Error('OpenAI API 请求失败');
                    }

                    const data = await response.json();
                    const reply = data.choices[0].message.content.replace(/\n/g, '<br>');
                    responseDiv.innerHTML = reply;
                } catch (error) {
                    responseDiv.innerHTML = `错误: ${error.message}`;
                }

                responseDiv.classList.remove('loading'); // 移除加载动画
                input.value = ''; // 清空输入框
            }

            // 监听 Enter 键发送消息
            document.getElementById('chatInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
        </script>
    </body>
</html>
